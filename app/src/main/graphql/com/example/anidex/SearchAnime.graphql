query SearchAnime($page: Int!, $perPage: Int!, $search: String!) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            hasNextPage
        }
        media(type: ANIME, search: $search, sort: POPULARITY_DESC) {
            id
            title {
                english
                romaji
                native
            }
            coverImage {
                large
            }
            episodes
            averageScore
            season
            seasonYear
            genres
        }
    }
}