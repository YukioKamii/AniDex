query SearchManga($search: String) {
    Page(page: 1, perPage: 20) {
        media(type: MANGA, search: $search, sort: POPULARITY_DESC) {
            id
            title {
                romaji
                english
                native
            }
            coverImage {
                large
            }
            averageScore
            chapters
            volumes
            status
            genres
        }
    }
}