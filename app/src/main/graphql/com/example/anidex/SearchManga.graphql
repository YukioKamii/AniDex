query SearchManga($page: Int!, $perPage: Int!, $search: String!) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            hasNextPage
        }
        media(type: MANGA, search: $search, sort: POPULARITY_DESC) {
            id
            title {
                english
                romaji
                native
            }
            coverImage {
                large
            }
            chapters
            volumes
            averageScore
            status
            genres
        }
    }
}